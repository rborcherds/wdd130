    <main class=" grid contactus">
        <!-- <img src="images/rafting28_1024.jpg" alt="little" class="con-hero"> -->
        <div class="cntbkg con-hero"></div>
        <div class="contact">
            <h1 class="center">Contact Us</h1>
            <form action="#" >
                <fieldset class="contact-fields">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="from">
                    <label for="email">e-Mail</label>
                    <input type="email" name="email" id="email">
                    <label for="reason">Reason for contacting us?</label>
                    <select name="reason" id="reason">
                        <option value="" selected disabled>-- Please select One -- </option>
                        <option value="general">General Inquiry</option>
                        <option value="reservation">Reservation Question </option>
                        <option value="suggestion">Website Suggestion/option>
                    </select>
                    <label for="comment">Please enter your comment:</label>
                    <textarea name="comment" id="comment" cols="35" rows="10"></textarea>
                    <div class="signup">
                        <input type="checkbox" name="subscribe" id="newsletter">
                        <label for="newsletter">Please subscribe me to the monthly newsletter</label>
                    </div>
                </fieldset>
                <button type="submit" class="submit">Send Message</button>
            </form>
        </div>
        <div class="address">
            <h2 class="center">Contact Information</h2>
            <div class="add-phone">
                <address>525 S Center St,<br> Rexburg, ID 83460</address>
                <a href="tel:1235551234">(123) 555-1234</a>
                <a
                    href="&#101;&#109;&#097;&#105;&#108;&#105;&#110;&#102;&#111;&#064;&#119;&#104;&#105;&#116;&#101;&#119;&#097;&#116;&#101;&#114;&#114;&#097;&#102;&#116;&#105;&#110;&#103;&#046;&#099;&#111;&#109;">email:
                    &#105;&#110;&#102;&#111;&#064;&#119;&#104;&#105;&#116;&#101;&#119;&#097;&#116;&#101;&#114;&#114;&#097;&#102;&#116;&#105;&#110;&#103;&#046;&#099;&#111;&#109;</a>
            </div>
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2213.9662753582243!2d-111.78361571748994!3d43.81450909974499!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x53540b03dc48a5cf%3A0x1e5534d3c38ef412!2sBrigham%20Young%20University-Idaho!5e0!3m2!1sen!2sus!4v1707770074960!5m2!1sen!2sus"
                width="600" height="450" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"
                class="gmap"></iframe>
        </div>
        <hr class="hrule">
        <div class="grid employees">
            <figure class="employee">
